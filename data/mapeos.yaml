# =============================================================================
# data/mapeos.yaml
# Tablas de conversión SketchUp → Schmidt Groupe
# Módulo C — Mapeo y cálculo
#
# Organización:
#   - del_csv:       Mapeos de campos que vienen directamente del CSV de SKP
#   - forzadas:      Opciones calculadas automáticamente por el Módulo C
#   - interfaz:      Opciones que vienen del Módulo B (selección del usuario)
#
# IMPORTANTE: Si cambia un código SG, un color o una regla, editar solo este
# archivo — sin tocar el código Python.
#
# Pendientes:
#   - op_300:        Q2C y Q3C provisionales, pendiente confirmar Q2H y Q3H
#   - op_231:        Formato de entrega del valor final de ancho pendiente IT SG
# =============================================================================


# =============================================================================
# DEL CSV
# Campos que vienen directamente del archivo CSV exportado desde SketchUp
# =============================================================================

del_csv:

  # ---------------------------------------------------------------------------
  # Apertura → Sentido de apertura de puerta
  # Códigos confirmados por el Índice A (G: Gauche, D: Droite, L: Lift)
  # ---------------------------------------------------------------------------
  apertura:
    "I": "G"
    "1": "G"
    "D": "D"
    "2": "D"
    "3": "L"

  # ---------------------------------------------------------------------------
  # D_Gama → Opción 100 — Gama del frente
  # ---------------------------------------------------------------------------
  op_100:
    "1": "LAC"
    "2": "WOD"
    "3": "LNO"
    "4": "LMI"

  # ---------------------------------------------------------------------------
  # ColorFrente → Opción 101 — Acabado del frente
  # Los valores del CSV incluyen el sufijo de gama (ej. "Crema LACA", "Oak WOOD")
  # ---------------------------------------------------------------------------
  op_101:
    # LACA (LAC)
    "Crema LACA":       "CR6"
    "Seda LACA":        "SED"
    "Blanco LACA":      "BAO"
    "Petal LACA":       "PEA"
    "Vela LACA":        "VL6"
    "Marga LACA":       "MAA"
    "Zafiro LACA":      "ZAF"
    "Uva LACA":         "UVA"
    "Noche LACA":       "NOE"
    "Pino LACA":        "PI6"
    "Halo LACA":        "HAL"
    "Grass LACA":       "GRS"
    "Laurel LACA":      "LAU"
    # WOOD (WOD)
    "Nordic Oak WOOD":  "TCK"
    "Oak WOOD":         "TAK"
    "Smoked Oak WOOD":  "TNK"
    # LINOLEO (LNO) — sin tilde, así llega del CSV
    "Mushroom LINOLEO": "IMH"
    "Macadamia LINOLEO": "IMD"
    "Clay LINOLEO":     "ICY"
    "Walnut LINOLEO":   "IWL"
    "Espresso LINOLEO": "IES"
    "Pistachio LINOLEO": "IPI"
    "Olive LINOLEO":    "IOL"
    "Conifer LINOLEO":  "ICO"
    "Vapour LINOLEO":   "IVA"
    "Blue Haze LINOLEO": "IBH"
    "Smokey Blue LINOLEO": "IYB"
    # LAMINADO (LMI)
    "Sable LAMINADO":   "ASA"
    "Agave LAMINADO":   "AGV"
    "Sombra LAMINADO":  "ASO"
    "Cloud LAMINADO":   "ACU"
    "Polar LAMINADO":   "APA"
    "Mos LAMINADO":     "AMS"
    "Ash LAMINADO":     "AAS"
    "Saten LAMINADO":   "AST"
    "Lirio LAMINADO":   "AII"
    "Carbon LAMINADO":  "ACB"
    "Metal LAMINADO":   "AMT"

  # ---------------------------------------------------------------------------
  # Color del interior → Opción 200 — Color interior del mueble
  # No aplica a POBIF, PO1BIF, PO2BIF — vendrá vacío desde el CSV
  # ---------------------------------------------------------------------------
  op_200:
    "Blanco mueble": "1CC"
    "Gris mueble":   "2CC"
    "Negro mueble":  "3CC"
    "Roble mueble":  "4CC"

  # ---------------------------------------------------------------------------
  # Tirador → Opción 217 — Sistema de apertura sin tirador físico
  # Solo aplica si el valor es 20 (TL1) o 21 (PS1). Resto → vacío.
  # ---------------------------------------------------------------------------
  op_217:
    "20": "TL1"
    "21": "PS1"

  # ---------------------------------------------------------------------------
  # Tirador → Opción 300 — Tipo de tirador
  # Solo aplica si el valor NO es 20 ni 21.
  # ⚠️ Q2C y Q3C son provisionales — pendiente confirmar Q2H y Q3H
  # ---------------------------------------------------------------------------
  op_300:
    "2":  "ROU"
    "3":  "SQU"
    "4":  "Q2C"   # provisional
    "5":  "Q3C"   # provisional
    "7":  "Q1C"
    "20": "499"
    "21": "499"

  # ---------------------------------------------------------------------------
  # Opción 301 — Color del tirador
  #
  # Lógica de selección según tipo de tirador (op_300):
  #   - Integrado (ROU, SQU)          → usar campo "Trasera"        → op_301_integrado
  #   - De superficie (Q2x, Q3x, Q1C) → usar campo "Color tir. sup" → op_301_superficie
  #   - Sin tirador (499)             → op_301 vacío
  #
  # op_301_integrado: campo "Trasera" del CSV
  # Cuando el valor es "Laca", copiar ColorFrente y aplicar este mismo mapeo.
  # ---------------------------------------------------------------------------
  op_301_integrado:
    "Nordic Oak WOOD":  "NOK"
    "Oak WOOD":         "OAK"
    "Smoked Oak WOOD":  "SMK"
    # Colores LACA: cuando Trasera = "Laca", se copia el valor de ColorFrente
    # y se busca en este mismo diccionario usando solo el nombre del color sin sufijo.
    # Los códigos de laca para tiradores integrados son los mismos que op_101:
    "Crema":   "CR6"
    "Seda":    "SED"
    "Blanco":  "BAO"
    "Petal":   "PEA"
    "Vela":    "VL6"
    "Marga":   "MAA"
    "Zafiro":  "ZAF"
    "Uva":     "UVA"
    "Noche":   "NOE"
    "Pino":    "PI6"
    "Halo":    "HAL"
    "Grass":   "GRS"
    "Laurel":  "LAU"

  # op_301_superficie: campo "Color tir. de superficie" del CSV
  op_301_superficie:
    "Inox":  "IN7"
    "Brass": "BR6"
    "Blanco": "LB6"
    "Negro": "NE6"
    "Arena": "AR6"
    "Brown": "BO6"

  # ---------------------------------------------------------------------------
  # C_Rodapietext → Opción 402 — Altura de las patas
  # ---------------------------------------------------------------------------
  op_402:
    "70 mm":  "70"
    "100 mm": "100"
    "0 mm":   "SPI"

  # ---------------------------------------------------------------------------
  # Ancho + Ancho reducido → Opción 231 — Reducción de ancho
  # Lógica: si Ancho == "10000 mm" → op_231 = "RL3" y valor_final = Ancho reducido
  #         si Ancho != "10000 mm" → op_231 = vacío
  # ⚠️ Formato de entrega del valor final a SG pendiente de confirmar con IT SG
  # ---------------------------------------------------------------------------
  op_231:
    trigger_ancho: "10000 mm"
    codigo: "RL3"


# =============================================================================
# FORZADAS
# Opciones calculadas automáticamente por el Módulo C.
# No requieren input del CSV ni del Módulo B.
# =============================================================================

forzadas:

  # ---------------------------------------------------------------------------
  # Opción 103 — Sentido de la veta
  # Aplica a muebles con gama WOOD o Laminado Metal (AMT)
  # ---------------------------------------------------------------------------
  op_103:
    gamas_con_veta:
      - "WOD"
    colores_con_veta:
      - "Metal LAMINADO"  # AMT
    valor: "VER"

  # ---------------------------------------------------------------------------
  # Opción 104 — Acabado canto del frente
  # ---------------------------------------------------------------------------
  op_104:
    por_gama:
      "LAC": null        # mismo código que op_101 (se calcula en el código)
      "WOD": ""          # vacío
      "LNO": "HAK"
      "LMI": ""          # vacío

  # ---------------------------------------------------------------------------
  # Opción 203 — Espesor canto mueble
  # Todos los muebles excepto POBIF, PO1BIF, PO2BIF
  # ---------------------------------------------------------------------------
  op_203:
    valor: "E14"
    excluidos:
      - "POBIF"
      - "PO1BIF"
      - "PO2BIF"

  # ---------------------------------------------------------------------------
  # Opción 204 — Acabado canto mueble
  # Mismo código que op_200. Excluidos: POBIF, PO1BIF, PO2BIF
