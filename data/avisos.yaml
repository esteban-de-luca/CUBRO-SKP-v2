# =============================================================================
# data/avisos.yaml
# Frases estándar de aviso para el usuario — CUBRO × Schmidt Gruppe
# SOLO LECTURA — no modificar sin actualizar también la documentación en Notion
#
# Secciones por módulo:
#   modulo_a: avisos generados durante la validación del CSV
#   modulo_c: avisos generados durante el mapeo de opciones SG
# =============================================================================

modulo_a:

  # A24 — Tirador no permitido para el mueble (lista blanca reglas.yaml).
  # Se genera cuando el CSV incluye un tirador cuyo código SG no figura en la
  # lista tiradores_restringidos definida para ese mueble en modulo_c.op_300.
  # Fuente de la lista: data/reglas.yaml → modulo_c.op_300.tiradores_restringidos.
  A24: >-
    El tirador '[tirador]' no está permitido para este mueble —
    solo se admiten: [lista_sg].

  # A25 — Confusión Touch Latch / Prise de main.
  # Se genera cuando el CSV asigna uno de los dos mecanismos al tipo de mueble
  # que solo admite el contrario.
  # Fuente: data/opciones_mueble.yaml → op_217.solo_TL1 / solo_PS1.
  # Cubre todos los casos: mueble sin mecanismo, TL en mueble solo_PS1 o sin lista,
  # PS en mueble solo_TL1 o sin lista.
  A25: >-
    Este mueble no es compatible con el tirador [nombre_tirador].

modulo_c:

  # AV01 — Opción seleccionada no disponible para el mueble.
  # Se genera cuando el usuario ha marcado una opción que no aplica al mueble
  # (caso defensivo; el Módulo B debería haberlo filtrado en el Paso 1).
  AV01: >-
    La selección de [parámetro] no está disponible para este mueble.
    El mueble llevará el valor por defecto.

  # AV02 — Mueble con op_700 forzada a DEM (muebles HH*).
  # Estos muebles siempre se entregan sin encolar para facilitar el montaje
  # en esquina: el pegado lo hace el instalador en obra.
  AV02: >-
    Este mueble siempre se entrega sin encolar para facilitar el montaje.

  # AV03 — SPF forzado (Plantea en cualquier mueble, o Curve/Line en monopuerta alto).
  # El mecanizado estándar para tirador no es compatible con esta combinación.
  AV03: >-
    Este mueble no lleva mecanización para tirador.
