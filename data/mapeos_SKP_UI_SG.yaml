# =============================================================================
# data/mapeos_SKP_UI_SG.yaml
# Tablas de conversión: SketchUp CSV → Schmidt Groupe
#
# Lógica de ejecución (Módulo C):
#   1. reglas.yaml  → determina qué opciones calcular y con qué valor
#   2. este archivo → convierte los valores a códigos SG
#
# Secciones:
#   del_csv   — campos del CSV de SketchUp → códigos SG
#   forzadas  — opciones calculadas automáticamente por el Módulo C
#   nombres   — designación en español (UI) → designación oficial en francés (SG)
#               El campo p_item_label del JSON de salida usa la designación SG.
# =============================================================================


# =============================================================================
# DEL CSV
# Campos que vienen del archivo CSV exportado desde SketchUp.
# =============================================================================

del_csv:

  # ---------------------------------------------------------------------------
  # Apertura → Sentido de apertura de puerta
  # Campo obligatorio. Códigos confirmados por el Índice A.
  # G: Gauche (izquierda) · D: Droite (derecha) · L: Lift
  # ---------------------------------------------------------------------------
  apertura:
    # valor_csv:  código_SG
    "I": "G"
    "1": "G"
    "D": "D"
    "2": "D"
    "3": "L"

  # ---------------------------------------------------------------------------
  # D_Gama → Opción 100 — Gama del frente
  # ---------------------------------------------------------------------------
  op_100:
    "1": "LAC"   # LACA
    "2": "WOD"   # WOOD
    "3": "LNO"   # LINOLEO
    "4": "LMI"   # LAMINADO

  # ---------------------------------------------------------------------------
  # ColorFrente → Opción 101 — Acabado del frente
  # El valor CSV incluye el sufijo de gama (ej. "Crema LACA").
  # La etiqueta UI es el nombre sin sufijo (ej. "Crema").
  # ---------------------------------------------------------------------------
  op_101:
    # LACA (LAC)
    "Crema LACA":          "CR6"
    "Seda LACA":           "SED"
    "Blanco LACA":         "BAO"
    "Petal LACA":          "PEA"
    "Vela LACA":           "VL6"
    "Marga LACA":          "MAA"
    "Zafiro LACA":         "ZAF"
    "Uva LACA":            "UVA"
    "Noche LACA":          "NOE"
    "Pino LACA":           "PI6"
    "Halo LACA":           "HAL"
    "Grass LACA":          "GRS"
    "Laurel LACA":         "LAU"
    # WOOD (WOD)
    "Nordic Oak WOOD":     "TCK"
    "Oak WOOD":            "TAK"
    "Smoked Oak WOOD":     "TNK"
    # LINOLEO (LNO) — sin tilde, así llega del CSV
    "Mushroom LINOLEO":    "IMH"
    "Macadamia LINOLEO":   "IMD"
    "Clay LINOLEO":        "ICY"
    "Walnut LINOLEO":      "IWL"
    "Espresso LINOLEO":    "IES"
    "Pistachio LINOLEO":   "IPI"
    "Olive LINOLEO":       "IOL"
    "Conifer LINOLEO":     "ICO"
    "Vapour LINOLEO":      "IVA"
    "Blue Haze LINOLEO":   "IBH"
    "Smokey Blue LINOLEO": "IYB"
    # LAMINADO (LMI)
    "Sable LAMINADO":      "ASA"
    "Agave LAMINADO":      "AGV"
    "Sombra LAMINADO":     "ASO"
    "Cloud LAMINADO":      "ACU"
    "Polar LAMINADO":      "APA"
    "Mos LAMINADO":        "AMS"
    "Ash LAMINADO":        "AAS"
    "Saten LAMINADO":      "AST"
    "Lirio LAMINADO":      "AII"
    "Carbon LAMINADO":     "ACB"
    "Metal LAMINADO":      "AMT"

  # ---------------------------------------------------------------------------
  # Color del interior → Opción 200 — Color interior del mueble
  # No aplica a POBIF, PO1BIF, PO2BIF — vendrá vacío desde el CSV.
  # ---------------------------------------------------------------------------
  op_200:
    "Blanco mueble": "1CC"
    "Gris mueble":   "2CC"
    "Negro mueble":  "3CC"
    "Roble mueble":  "4CC"

  # ---------------------------------------------------------------------------
  # Tirador → Opción 217 — Sistema de apertura sin tirador físico
  # Solo aplica si el valor es 20 o 21. Resto → vacío.
  # ---------------------------------------------------------------------------
  op_217:
    "20": "TL1"   # Touch Latch
    "21": "PS1"   # Prise de main

  # ---------------------------------------------------------------------------
  # Tirador → Opción 300 — Tipo de tirador
  # Solo aplica si el valor NO es 20 ni 21.
  #
  # ⚠️ Curve (4) y Line (5) tienen dos códigos según el tipo de mueble:
  #   - sufijo H: puerta batiente
  #   - sufijo C: cajón, bloque extraíble, coulissant, lift
  # La lógica de selección H/C está en reglas.yaml.
  # ---------------------------------------------------------------------------
  op_300:
    "2": "ROU"          # Round
    "3": "SQU"          # Square
    "4": "Q2H / Q2C"    # Curve  — ver reglas.yaml para lógica H/C
    "5": "Q3H / Q3C"    # Line   — ver reglas.yaml para lógica H/C
    "7": "Q1C"          # Plantea
    "20": "499"         # Touch Latch (sin tirador físico)
    "21": "499"         # Prise de main (sin tirador físico)

  # ---------------------------------------------------------------------------
  # Opción 301 — Color del tirador
  #
  # La tabla que aplica depende del tipo de tirador (op_300):
  #   - Integrado (ROU, SQU)          → campo "Trasera" del CSV → op_301_integrado
  #   - De superficie (Q2x, Q3x, Q1C) → campo "Color tir. sup"  → op_301_superficie
  #   - Sin tirador (499)             → vacío, no se envía
  #
  # Caso especial integrado: si Trasera = "Laca", copiar ColorFrente
  # y aplicar el mismo mapeo op_301_integrado con el nombre del color sin sufijo.
  # ---------------------------------------------------------------------------
  op_301_integrado:
    # Campo "Trasera" del CSV
    "Nordic Oak WOOD":  "NOK"
    "Oak WOOD":         "OAK"
    "Smoked Oak WOOD":  "SMK"
    # Cuando Trasera = "Laca": se usa el nombre del color de ColorFrente sin sufijo
    "Crema":   "CR6"
    "Seda":    "SED"
    "Blanco":  "BAO"
    "Petal":   "PEA"
    "Vela":    "VL6"
    "Marga":   "MAA"
    "Zafiro":  "ZAF"
    "Uva":     "UVA"
    "Noche":   "NOE"
    "Pino":    "PI6"
    "Halo":    "HAL"
    "Grass":   "GRS"
    "Laurel":  "LAU"

  op_301_superficie:
    # Campo "Color tir. de superficie" del CSV
    "Inox":   "IN7"
    "Brass":  "BR6"
    "Blanco": "LB6"
    "Negro":  "NE6"
    "Arena":  "AR6"
    "Brown":  "BO6"

  # ---------------------------------------------------------------------------
  # C_Rodapietext → Opción 402 — Altura de las patas
  # ---------------------------------------------------------------------------
  op_402:
    "70 mm":  "70"
    "100 mm": "100"
    "0 mm":   "SPI"   # Sin patas

  # ---------------------------------------------------------------------------
  # Ancho + Ancho reducido → Opción 231 — Reducción de ancho
  #
  # Si Ancho == "10000 mm" → op_231 = RL3 y el valor final va en p_param1 del JSON.
  # Si Ancho != "10000 mm" → op_231 vacío.
  #
  # Confirmado con SG: reducción máxima 299 mm, ancho mínimo resultante 300 mm.
  # ---------------------------------------------------------------------------
  op_231:
    trigger_ancho: "10000 mm"
    codigo: "RL3"
    campo_salida: "p_param1"


# =============================================================================
# FORZADAS
# Opciones calculadas automáticamente por el Módulo C.
# No requieren input del CSV ni del Módulo B.
# =============================================================================

forzadas:

  # ---------------------------------------------------------------------------
  # Opción 103 — Sentido de la veta
  # Aplica a todos los muebles con gama WOOD o color Metal LAMINADO (AMT).
  # ---------------------------------------------------------------------------
  op_103:
    aplica_a_gamas:   ["WOD"]
    aplica_a_colores: ["Metal LAMINADO"]
    valor: "VER"

  # ---------------------------------------------------------------------------
  # Opción 104 — Acabado canto del frente
  # ---------------------------------------------------------------------------
  op_104:
    por_gama:
      "LAC": null    # mismo código que op_101 del mueble
      "LNO": "HAK"
      "WOD": ""      # vacío
      "LMI": ""      # vacío

  # ---------------------------------------------------------------------------
  # Opción 203 — Espesor canto mueble
  # Todos los muebles excepto frentes de lavavajillas (POBIF, PO1BIF, PO2BIF).
  # ---------------------------------------------------------------------------
  op_203:
    valor: "E14"
    excluidos: ["POBIF4580", "POBIF6080", "PO1BIF4580", "PO1BIF6080", "PO2BIF4580", "PO2BIF6080"]

  # ---------------------------------------------------------------------------
  # Opción 204 — Acabado canto mueble
  # Mismo código que op_200 del mueble.
  # Excluidos: mismos que op_203.
  # ---------------------------------------------------------------------------
  op_204:
    copia_de: "op_200"
    excluidos: ["POBIF4580", "POBIF6080", "PO1BIF4580", "PO1BIF6080", "PO2BIF4580", "PO2BIF6080"]

  # ---------------------------------------------------------------------------
  # Opción 206 — Sistema de cierre
