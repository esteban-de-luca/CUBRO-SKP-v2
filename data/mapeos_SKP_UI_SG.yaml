# =============================================================================
# data/mapeos_SKP_UI_SG.yaml
# Tablas de conversión: SketchUp CSV → Etiqueta UI → Código Schmidt Groupe
#
# Cada entrada del bloque del_csv tiene tres valores:
#   skp — valor tal como llega en el CSV de SketchUp
#   ui  — etiqueta en español que se muestra al usuario
#   sg  — código que se envía a Schmidt Groupe
#
# Secciones:
#   opciones — índice de todas las opciones: campo SKP, etiqueta UI y opción SG
#   del_csv  — tablas de conversión de valores concretos del CSV
#   forzadas — opciones calculadas automáticamente por el Módulo C (solo código SG)
#   nombres  — designación ES (catalogo.json) → designación oficial en francés (SG)
# =============================================================================


# =============================================================================
# OPCIONES
# Índice de todas las opciones del pedido.
# Muestra de dónde viene cada dato (skp), cómo se llama en la UI y a qué
# opción SG corresponde.
# Las tablas de valores concretos están en la sección del_csv.
# =============================================================================

opciones:

  # Del CSV de SketchUp
  - { skp: Apertura,                           ui: Apertura,              sg: p_hinge }
  - { skp: D_Gama,                             ui: Gama del frente,       sg: op_100  }
  - { skp: ColorFrente,                        ui: Acabado del frente,    sg: op_101  }
  - { skp: "Color del interior",               ui: Color interior,        sg: op_200  }
  - { skp: Tirador,                            ui: Apertura sin tirador,  sg: op_217  }
  - { skp: Tirador,                            ui: Tipo de tirador,       sg: op_300  }
  - { skp: "Trasera / Color tir. de superficie", ui: Color tirador,       sg: op_301  }
  - { skp: C_Rodapietext,                      ui: Rodapié,               sg: op_402  }
  - { skp: Ancho,                              ui: Reducción de ancho,    sg: op_231  }

  # Selección del usuario en el Paso 1
  - { skp: "", ui: Sin mecanizado para tirador, sg: op_121 }
  - { skp: "", ui: "Equipamiento",              sg: op_207 }   # modificado 21/05/2026, confirmado por Jean Dilmetz el 20/05/2026 — UI varía: "Cubos de basura" (fregadero) o "Tipo de almacenamiento" (AGM)
  - { skp: "", ui: Recorte para perfil LED,     sg: op_220 }
  - { skp: "", ui: Sensor para mando LED,       sg: op_222 }
  - { skp: "", ui: Cajón interior,              sg: op_223 }
  - { skp: "", ui: Mueble de caldera,           sg: op_227 }
  - { skp: "", ui: Mueble sin encolar,          sg: op_700 }
  - { skp: "", ui: Electrodoméstico,            sg: op_126 }

  # Forzadas por el Módulo C (sin intervención del usuario)
  - { skp: "", ui: "", sg: op_103 }
  - { skp: "", ui: "", sg: op_104 }
  - { skp: "", ui: "", sg: op_203 }
  - { skp: "", ui: "", sg: op_204 }
  - { skp: "", ui: "", sg: op_206 }
  - { skp: "", ui: "", sg: op_208 }
  - { skp: "", ui: "", sg: op_209 }


# =============================================================================
# DEL CSV
# Tablas de conversión de valores concretos del CSV de SketchUp.
# =============================================================================

del_csv:

  # ---------------------------------------------------------------------------
  # Apertura → Sentido de apertura de puerta
  # G: Gauche (izquierda) · D: Droite (derecha) · L: Lift
  # SketchUp puede enviar el valor como número o como letra.
  # ---------------------------------------------------------------------------
  apertura:
    - { skp: "1",  ui: Izquierda, sg: G }
    - { skp: "I",  ui: Izquierda, sg: G }
    - { skp: "2",  ui: Derecha,   sg: D }
    - { skp: "D",  ui: Derecha,   sg: D }
    - { skp: "3",  ui: Lift,      sg: L }

  # ---------------------------------------------------------------------------
  # D_Gama → Opción 100 — Gama del frente
  # ---------------------------------------------------------------------------
  op_100:
    - { skp: "1", ui: LACA,     sg: LAC }
    - { skp: "2", ui: WOOD,     sg: WOD }
    - { skp: "3", ui: LINOLEO,  sg: LNO }
    - { skp: "4", ui: LAMINADO, sg: LMI }

  # ---------------------------------------------------------------------------
  # ColorFrente → Opción 101 — Acabado del frente
  # El valor SKP incluye el sufijo de gama (ej. "Crema LACA").
  # La etiqueta UI es el nombre sin sufijo (ej. "Crema").
  # ---------------------------------------------------------------------------
  op_101:
    # LACA
    - { skp: "Crema LACA",          ui: Crema,       sg: CR6 }
    - { skp: "Seda LACA",           ui: Seda,        sg: SED }
    - { skp: "Blanco LACA",         ui: Blanco,      sg: BAO }
    - { skp: "Petal LACA",          ui: Petal,       sg: PEA }
    - { skp: "Vela LACA",           ui: Vela,        sg: VL6 }
    - { skp: "Marga LACA",          ui: Marga,       sg: MAA }
    - { skp: "Zafiro LACA",         ui: Zafiro,      sg: ZAF }
    - { skp: "Uva LACA",            ui: Uva,         sg: UVA }
    - { skp: "Noche LACA",          ui: Noche,       sg: NOE }
    - { skp: "Pino LACA",           ui: Pino,        sg: PI6 }
    - { skp: "Halo LACA",           ui: Halo,        sg: HAL }
    - { skp: "Grass LACA",          ui: Grass,       sg: GRS }
    - { skp: "Laurel LACA",         ui: Laurel,      sg: LAU }
    # WOOD
    - { skp: "Nordic Oak WOOD",     ui: Nordic Oak,  sg: TCK }
    - { skp: "Oak WOOD",            ui: Oak,         sg: TAK }
    - { skp: "Smoked Oak WOOD",     ui: Smoked Oak,  sg: TNK }
    # LINOLEO (sin tilde, así llega del CSV)
    - { skp: "Mushroom LINOLEO",    ui: Mushroom,    sg: IMH }
    - { skp: "Macadamia LINOLEO",   ui: Macadamia,   sg: IMD }
    - { skp: "Clay LINOLEO",        ui: Clay,        sg: ICY }
    - { skp: "Walnut LINOLEO",      ui: Walnut,      sg: IWL }
    - { skp: "Espresso LINOLEO",    ui: Espresso,    sg: IES }
    - { skp: "Pistachio LINOLEO",   ui: Pistachio,   sg: IPI }
    - { skp: "Olive LINOLEO",       ui: Olive,       sg: IOL }
    - { skp: "Conifer LINOLEO",     ui: Conifer,     sg: ICO }
    - { skp: "Vapour LINOLEO",      ui: Vapour,      sg: IVA }
    - { skp: "Blue Haze LINOLEO",   ui: Blue Haze,   sg: IBH }
    - { skp: "Smokey Blue LINOLEO", ui: Smokey Blue, sg: IYB }
    # LAMINADO
    - { skp: "Sable LAMINADO",      ui: Sable,       sg: ASA }
    - { skp: "Agave LAMINADO",      ui: Agave,       sg: AGV }
    - { skp: "Sombra LAMINADO",     ui: Sombra,      sg: ASO }
    - { skp: "Cloud LAMINADO",      ui: Cloud,       sg: ACU }
    - { skp: "Polar LAMINADO",      ui: Polar,       sg: APA }
    - { skp: "Mos LAMINADO",        ui: Mos,         sg: AMS }
    - { skp: "Ash LAMINADO",        ui: Ash,         sg: AAS }
    - { skp: "Saten LAMINADO",      ui: Saten,       sg: AST }
    - { skp: "Lirio LAMINADO",      ui: Lirio,       sg: AII }
    - { skp: "Carbon LAMINADO",     ui: Carbon,      sg: ACB }
    - { skp: "Metal LAMINADO",      ui: Metal,       sg: AMT }

  # ---------------------------------------------------------------------------
  # Color del interior → Opción 200 — Color interior del mueble
  # ---------------------------------------------------------------------------
  op_200:
    - { skp: "Blanco mueble", ui: Blanco, sg: 1CC }
    - { skp: "Gris mueble",   ui: Gris,   sg: 2CC }
    - { skp: "Negro mueble",  ui: Negro,  sg: 3CC }
    - { skp: "Roble mueble",  ui: Roble,  sg: 4CC }

  # ---------------------------------------------------------------------------
  # Tirador → Opción 217 — Sistema de apertura sin tirador físico
  # Solo aplica si el valor es 20 (Touch Latch) o 21 (Prise de main).
  # ---------------------------------------------------------------------------
  op_217:
    - { skp: "20", ui: Touch Latch,   sg: TL1 }
    - { skp: "21", ui: Prise de main, sg: PS1 }

  # ---------------------------------------------------------------------------
  # Tirador → Opción 300 — Tipo de tirador
  # Solo aplica si el valor NO es 20 ni 21.
  #
  # ⚠️ Curve (4) y Line (5) tienen dos códigos según el tipo de mueble:
  #   - sufijo H: puerta batiente
  #   - sufijo C: cajón, bloque extraíble, coulissant, lift
  # La lógica de selección H/C está en reglas.yaml.
  # ---------------------------------------------------------------------------
  op_300:
    - { skp: "2",  ui: Round,         sg: ROU }
    - { skp: "3",  ui: Square,        sg: SQU }
    - { skp: "4",  ui: Curve,         sg: Q2H }  # o Q2C según reglas.yaml
    - { skp: "5",  ui: Line,          sg: Q3H }  # o Q3C según reglas.yaml
    - { skp: "7",  ui: Plantea,       sg: Q1C }
    - { skp: "20", ui: Touch Latch,   sg: 499 }
    - { skp: "21", ui: Prise de main, sg: 499 }

  # ---------------------------------------------------------------------------
  # Opción 301 — Color del tirador
  #
  # Dos inputs del CSV confluyen en esta misma opción:
  #   - Trasera           → tirador integrado (Round, Square)
  #   - Color tir. sup.   → tirador de superficie (Curve, Line, Plantea)
  #   - Sin tirador (20/21) → vacío, no se envía
  #
  # Caso especial integrado: si Trasera = "Laca", el skp es el color del frente
  # sin sufijo (ej. "Crema"), no la palabra "Laca".
  # ---------------------------------------------------------------------------
  op_301_integrado:
    # Valores del campo "Trasera" — colores WOOD
    - { skp: "Nordic Oak WOOD",  ui: Nordic Oak,  sg: NOK }
    - { skp: "Oak WOOD",         ui: Oak,         sg: OAK }
    - { skp: "Smoked Oak WOOD",  ui: Smoked Oak,  sg: SMK }
    # Cuando Trasera = "Laca": skp = color del frente sin sufijo
    - { skp: "Crema",   ui: Crema,  sg: CR6 }
    - { skp: "Seda",    ui: Seda,   sg: SED }
    - { skp: "Blanco",  ui: Blanco, sg: BAO }
    - { skp: "Petal",   ui: Petal,  sg: PEA }
    - { skp: "Vela",    ui: Vela,   sg: VL6 }
    - { skp: "Marga",   ui: Marga,  sg: MAA }
    - { skp: "Zafiro",  ui: Zafiro, sg: ZAF }
    - { skp: "Uva",     ui: Uva,    sg: UVA }
    - { skp: "Noche",   ui: Noche,  sg: NOE }
    - { skp: "Pino",    ui: Pino,   sg: PI6 }
    - { skp: "Halo",    ui: Halo,   sg: HAL }
    - { skp: "Grass",   ui: Grass,  sg: GRS }
    - { skp: "Laurel",  ui: Laurel, sg: LAU }

  op_301_superficie:
    # Valores del campo "Color tir. de superficie" — la ui coincide con el skp
    - { skp: "Inox",   ui: Inox,   sg: IN7 }
    - { skp: "Brass",  ui: Brass,  sg: BR6 }
    - { skp: "Blanco", ui: Blanco, sg: LB6 }
    - { skp: "Negro",  ui: Negro,  sg: NE6 }
    - { skp: "Arena",  ui: Arena,  sg: AR6 }
    - { skp: "Brown",  ui: Brown,  sg: BO6 }

  # ---------------------------------------------------------------------------
  # C_Rodapietext → Opción 402 — Altura de las patas
  # ---------------------------------------------------------------------------
  op_402:
    - { skp: "70 mm",  ui: 70 mm,     sg: "70"  }
    - { skp: "100 mm", ui: 100 mm,    sg: "100" }
    - { skp: "0 mm",   ui: Sin patas, sg: SPI   }

  # ---------------------------------------------------------------------------
  # Ancho → Opción 231 — Reducción de ancho
  # Si Ancho == "10000 mm" → se aplica reducción; el valor final va en p_param1.
  # Reducción máxima: 299 mm · Ancho mínimo resultante: 300 mm.
  # ---------------------------------------------------------------------------
  op_231:
    - { skp: "10000 mm", ui: Reducción de ancho, sg: RL3 }
    # El valor reducido (campo "Ancho reducido" del CSV) se envía en p_param1.


# =============================================================================
# FORZADAS
# Opciones calculadas automáticamente por el Módulo C.
# No requieren input del CSV ni selección del usuario.
# Las condiciones de aplicación están en reglas.yaml.
# =============================================================================

forzadas:

  op_103:   # Sentido de la veta
    sg: VER

  op_104:   # Acabado canto del frente — varía según gama (ver reglas.yaml)
    sg: HAK  # solo para LINOLEO; LACA copia op_101; WOOD y LAMINADO vacío

  op_203:   # Espesor canto mueble
    sg: E14

  op_204:   # Acabado canto mueble — copia el código de op_200 del mismo mueble
    sg: copia_op_200

  op_206:   # Sistema de cierre
    sg: FSP

  op_207:   # Equipamiento fregadero — forzado solo en BETOQ908057
    sg: P42

  op_208:   # Equipamiento esquinero Lemans
    sg: CPA

  op_209:   # Equipamiento cajón
    sg: BES

  op_700:   # Sin encolar (ver reglas.yaml)
    sg: DEM


# =============================================================================
# OPCIONALES
# Códigos SG de las opciones que el usuario puede seleccionar en el Paso 1.
# Las condiciones de aplicación por mueble están en opciones_mueble.yaml.
# =============================================================================

opcionales:

  op_121:
    - { ui: Sin mecanizado para tirador, sg: SPF }

  op_207_opcional:   # código determinado por el mueble (ver opciones_mueble.yaml)
    - { ui: Cubos de basura,              sg: P60 }   # BE2B608057, BEBTS608057
    - { ui: Cubos de basura,              sg: P90 }   # BE2B908057, BEBTS908057
    - { ui: Almacenamiento estándar,      sg: GM1 }   # AGM9020057, AGM9022057 — añadido 21/05/2026, confirmado por Jean Dilmetz el 20/05/2026
    - { ui: Botellero,                    sg: GM2 }   # AGM9020057, AGM9022057 — añadido 21/05/2026, confirmado por Jean Dilmetz el 20/05/2026

  op_220:
    - { ui: Recorte para perfil LED, sg: PRB }

  op_222:
    - { ui: "Sensor para mando LED (derecha)",   sg: DTD }
    - { ui: "Sensor para mando LED (izquierda)", sg: DTG }

  op_223:
    - { ui: Cajón interior, sg: TLH }

  op_227:
    - { ui: Mueble de caldera, sg: CCH }

  op_700_opcional:
    - { ui: Mueble sin encolar, sg: DEM }

  op_126:
    ui: Electrodoméstico                 # BFT, AFS, AFSMO, AFS2B, AFSMOBT
    sg: ""
    subcampos:
      marca:      Marca
      referencia: Referencia
      altura:     Altura
      tipo:       Tipo

  op_126_placa:                          # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    ui: Referencia placa                 # BCUB2T — añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    sg: ""                               # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    subcampos:                           # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
      marca:      Marca                  # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
      referencia: Referencia             # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026

  op_126_placa_aspirante:                # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    ui: Referencia placa aspirante       # BIBTS — añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    sg: ""                               # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    subcampos:                           # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
      marca:      Marca                  # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
      referencia: Referencia             # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026

  op_126_frigorifico:                    # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    ui: Referencia frigorífico           # A2I — añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    sg: ""                               # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
    subcampos:                           # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
      marca:      Marca                  # añadido 21/05/2026, confirmado por Lucía Rodríguez-Bermejo el 21/05/2026
