# =============================================================================
# data/reglas_opciones.yaml
# Para cada opción/parámetro SG: lista de muebles y tipo de aplicación.
#
# Leyenda:
#   O — Obligatoria: siempre se envía, requiere valor del CSV o catálogo
#   F — Forzada: el Módulo C la calcula y aplica automáticamente
#   P — Opcional: se incluye solo si el usuario la selecciona en el Paso 1
#
# Si un mueble no aparece en la lista de una opción → no aplica.
#
# Opciones excluidas (SG las calcula en AS400, no hace falta enviarlas):
#   op_103, op_104, op_203, op_204, op_209, p_built_in_detail
# =============================================================================


