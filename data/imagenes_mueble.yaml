# =============================================================================
# data/imagenes_mueble.yaml
# Mapeo prefijo de código de mueble → archivo PNG en assets/muebles/
# SOLO LECTURA — no modificar sin actualizar también la documentación en Notion
#
# Las claves se evalúan de MAYOR a MENOR longitud (longest-prefix-first).
# Un código de mueble se asigna al primer prefijo que coincida.
# Si ningún prefijo coincide, no se muestra imagen.
#
# Nota: el archivo ACQ31P.png corresponde al prefijo AQC31P (letras transpuestas
# en el nombre de fichero respecto al código de mueble).
# =============================================================================

prefijos:
  # ── Más largos primero para evitar capturas prematuras ───────────────────

  # ── Tapetas FF12 y FFAL10 ────────────────────────────────────────────────
