# =============================================================================
# data/p_item_schema.yaml
# Contrato JSON con Schmidt Groupe — estructura y valores por defecto del p_item.
# EDITAR AQUÍ cuando SG actualice el contrato (campos nuevos, tipos, defaults).
#
# Convenios de valor:
#   __computed__  →  modulo_c lo calcula en tiempo de ejecución (no configurable aquí)
#   __today__     →  modulo_c sustituye por la fecha de generación del pedido (YYYY-MM-DD)
# =============================================================================


# ── Campos del p_item ────────────────────────────────────────────────────────

p_item_defaults:

  p_ord_cat_code:           __computed__   # posición en el pedido — string ("1", "2"…)
  p_item_code:              __computed__   # código del mueble
  p_item_label:             __computed__   # designación oficial en francés (SG)
  p_item_origin_id:         __computed__   # pendiente de confirmar con SG
  p_father_item_origin_id:  __computed__   # pendiente de confirmar con SG
  p_quantity:               1              # siempre 1 (entero)
  p_hinge:                  __computed__   # apertura: G / D / L / C según mueble
  p_fastening:              __computed__   # calculado por reglas.yaml
  p_width:                  0              # reservado (entero)
  p_height:                 0              # reservado (entero)
  p_depth:                  0              # reservado (entero)
  p_delivery_date:          __today__      # fecha de generación del pedido (YYYY-MM-DD)


# ── Estructura de cada entrada en p_variant_options ──────────────────────────
# p_variant_options es una LISTA de objetos, uno por opción SG calculada.
# p_option va como string SIN prefijo "op_" (ej. "100", no "op_100").

p_variant_option_defaults:

  p_option:    __computed__   # número de opción SG como string (ej. "100", "206")
  p_article:   __computed__   # código de artículo SG (ej. "LAC", "CR6", "FSP")
  p_param1:    "0"            # reservado — siempre string "0"
  p_param2:    "0"            # reservado — siempre string "0"
  p_quantity:  "1"            # siempre string "1"
