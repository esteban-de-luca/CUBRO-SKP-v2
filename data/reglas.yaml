# =============================================================================
# data/reglas.yaml
# Reglas y opciones por mueble — Módulo C — Mapeo y cálculo
# SOLO LECTURA — no modificar sin actualizar también la documentación en Notion
#
# Estructura:
#   reglas_condicionales: lógica de negocio que depende de condiciones
#   muebles:             opciones forzadas y facultativas por código de mueble
#
# Lógica de ejecución del Módulo C:
#   1. Primero reglas_condicionales → determinan qué opciones calcular
#   2. Después mapeos_SKP_UI_SG.yaml → convierten los valores a códigos SG
#
# "auto" = valor calculado en modulo_c.py según lógica de mapeos o reglas
#
# Pendientes:
#   - op_300: Confirmar qué son Q2H y Q3H
#   - op_231: Formato de entrega del valor final a SG pendiente IT SG
# =============================================================================


# =============================================================================
# REGLAS CONDICIONALES
# =============================================================================

reglas_condicionales:

  # ---------------------------------------------------------------------------
  # op_121 — Mecanizado de frente (SPF)
  # ---------------------------------------------------------------------------
  op_121:
    tiradores_sin_spf:
      - "2"   # Round
      - "3"   # Square
      - "20"  # Touch Latch
      - "21"  # Prise de main
    tirador_spf_siempre:
      - "7"   # Plantea
    muebles_spf_forzado_line_curve:
      - "AQC31P4520057"
      - "AQC31P6020057"
      - "AQC31P4522057"
      - "AQC31P6022057"
      - "AVA1P4520035"
      - "AVA1P6020035"
      - "AVA1P9020035"
      - "AVA1P4520057"
      - "AVA1P6020057"
      - "AVA1P4522035"
      - "AVA1P6022035"
      - "AVA1P9022035"
      - "AVA1P4522057"
      - "AVA1P6022057"
      - "A2I1P6020057"
      - "A2I1P6022057"
    tiradores_spf_forzado_monoporte:
      - "4"   # Curve
      - "5"   # Line

  # ---------------------------------------------------------------------------
  # op_301 — Color del tirador
  # ---------------------------------------------------------------------------
  op_301:
    tiradores_integrados:
      - "ROU"
      - "SQU"
    tiradores_superficie:
      - "Q2C"
      - "Q2H"
      - "Q3C"
      - "Q3H"
      - "Q1C"
    sin_tirador:
      - "499"

  # ---------------------------------------------------------------------------
  # op_103 — Sentido de la veta
  # ---------------------------------------------------------------------------
  op_103:
    gamas_con_veta:
      - "WOD"
    colores_con_veta:
      - "Metal LAMINADO"

  # ---------------------------------------------------------------------------
  # op_104 — Acabado canto del frente
  # ---------------------------------------------------------------------------
  op_104:
    por_gama:
      "LAC": null   # mismo código que op_101
      "WOD": ""
      "LNO": "HAK"
      "LMI": ""

  # ---------------------------------------------------------------------------
  # op_231 — Reducción de ancho
  # Ver trigger y código en mapeos_SKP_UI_SG.yaml → del_csv → op_231
  # ---------------------------------------------------------------------------
  op_231: {}

  # ---------------------------------------------------------------------------
  # op_700 — DEM
  # Ver listas en opciones_mueble.yaml → op_700
  # ---------------------------------------------------------------------------
  op_700: {}


